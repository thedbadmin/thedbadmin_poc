global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'prometheus:9090'

  - job_name: 'postgresql'
    static_configs:
      - targets:
          - 'DB_HOST_PLACEHOLDER:9187'

  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 'DB_HOST_PLACEHOLDER:9100'

  - job_name: 'pgbackrest'
    static_configs:
      - targets:
          - 'DB_HOST_PLACEHOLDER:9854'
        labels:
          stanza: 'DB_STANZA_PLACEHOLDER'
          instance_name: 'postgres-server'
